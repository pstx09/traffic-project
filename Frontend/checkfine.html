<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Check Fine</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e3f2fd, #f4f6f9);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 35%;
            margin: 100px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            color: #555;
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
        }

        button {
            margin-top: 20px;
            width: 95%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .error {
            color: red;
            margin-bottom: 15px;
            font-weight: bold;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>🚦 Check Your Traffic Fine</h2>

    <!-- ERROR MESSAGE -->
    <p class="error" th:if="${error}" th:text="${error}"></p>

    <!-- FORM -->
    <form action="/checkFine" method="post">

        <label>Enter Vehicle Number</label><br>

        <input type="text" name="vehicleNumber" placeholder="e.g. TS09AB1234" required>

        <button type="submit">Check Fine</button>

    </form>

</div>

</body>
</html>
