<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Traffic Violation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
        }

        .container {
            width: 40%;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        img {
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>🚓 Add Traffic Violation</h2>

<form action="/saveViolation" method="post">

    <label>Vehicle Number:</label><br>
    <input type="text" name="vehicleNumber" required>
    <br><br>

    <label>Violation Type:</label><br>
    <input type="text" name="violationType" required>
    <br><br>

    <label>Fine Amount:</label><br>
    <input type="number" name="fineAmount" required>
    <br><br>

    <!-- 🔥 NEW: IMAGE URL INPUT -->
    <label>Violation Image URL:</label><br>
    <input type="text" id="imageUrl" name="imageUrl" 
           placeholder="Paste direct image link (.jpg/.png)" 
           oninput="previewImage()">
    <br><br>

    <p>Image Preview:</p>
    <img id="preview" width="200" style="display:none;">
    <br><br>

    <button type="submit">Submit</button>

</form>

<br>
<a href="/admin">⬅ Back to Dashboard</a>

</div>

<script>

function previewImage() {
    var url = document.getElementById("imageUrl").value;
    var img = document.getElementById("preview");

    if(url) {
        img.src = url;
        img.style.display = "block";
    } else {
        img.style.display = "none";
    }
}

</script>

</body>
</html>
