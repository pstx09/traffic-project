<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
        }

        .header {
            background: linear-gradient(to right, #0d47a1, #1976d2);
            color: white;
            padding: 15px;
            text-align: center;
        }

        .header h1 {
            margin: 5px;
        }

        .container {
            width: 95%;
            margin: 30px auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .search-box input {
            padding: 8px;
            width: 250px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .add-btn {
            background: #28a745;
        }

        .add-btn:hover {
            background: #218838;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        th {
            background: #0d47a1;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        img {
            border-radius: 8px;
            object-fit: cover;
        }

        .paid {
            color: green;
            font-weight: bold;
        }

        .unpaid {
            color: red;
            font-weight: bold;
        }

        .no-image {
            color: #999;
            font-size: 12px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🚓 Traffic Police Admin Panel</h1>
    <p>Government of India</p>
</div>

<div class="container">

    <!-- TOP BAR -->
    <div class="top-bar">

        <!-- SEARCH -->
        <form method="get" action="/admin" class="search-box">
            <input type="text" name="keyword" placeholder="Search Vehicle..." th:value="${keyword}">
            <button type="submit">Search</button>
        </form>

        <!-- ADD BUTTON -->
        <a href="/addViolation">
            <button class="add-btn">+ Add Violation</button>
        </a>

    </div>

    <!-- TABLE -->
    <table>
        <tr>
            <th>Vehicle</th>
            <th>Violation</th>
            <th>Fine</th>
            <th>Proof</th>
            <th>Status</th>
            <th>Action</th>
        </tr>

        <tr th:each="v : ${violations}">
            <td th:text="${v.vehicleNumber}"></td>
            <td th:text="${v.violationType}"></td>
            <td>₹ <span th:text="${v.fineAmount}"></span></td>

            <!-- ✅ IMAGE FROM URL -->
            <td>
                <img th:if="${v.imageName != null and v.imageName != ''}"
                     th:src="${v.imageName}"
                     width="100" height="70"/>

                <span th:if="${v.imageName == null or v.imageName == ''}" class="no-image">
                    No Image
                </span>
            </td>

            <!-- STATUS -->
            <td>
                <span th:if="${v.paid}" class="paid">✔ Paid</span>
                <span th:if="${!v.paid}" class="unpaid">❌ Unpaid</span>
            </td>

            <!-- ACTION -->
            <td>
                <a th:if="${!v.paid}" th:href="@{'/deleteViolation/' + ${v.id}}">
                    <button>Mark Paid</button>
                </a>
            </td>
        </tr>

    </table>

</div>

</body>
</html>
