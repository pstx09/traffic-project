<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Your Traffic Fines</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #e3f2fd, #f4f6f9);
            margin: 0;
            padding: 0;
        }

        .header {
            background: #0d47a1;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            width: 70%;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            border: 2px solid #0d47a1;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #0d47a1;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        img {
            border-radius: 8px;
            object-fit: cover;
        }

        .no-image {
            color: #999;
            font-size: 12px;
        }

        .total {
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            text-align: right;
        }

        .success {
            color: green;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
        }

        .qr-section {
            text-align: center;
            margin-top: 30px;
        }

        .btn {
            margin-top: 20px;
            padding: 10px 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-blue {
            background: #007bff;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>🚓 Traffic Police Department</h1>
    <p>Government of India</p>
</div>

<div class="container">

    <h2>Violation Details</h2>

    <table>
        <tr>
            <th>Vehicle</th>
            <th>Violation</th>
            <th>Fine</th>
            <th>Proof</th>
        </tr>

        <tr th:each="v : ${violations}">
            <td th:text="${v.vehicleNumber}"></td>
            <td th:text="${v.violationType}"></td>
            <td>₹ <span th:text="${v.fineAmount}"></span></td>

            <!-- ✅ IMAGE FROM URL -->
            <td>
                <img th:if="${v.imageName != null and v.imageName != ''}"
                     th:src="${v.imageName}"
                     width="120" height="90"/>

                <span th:if="${v.imageName == null or v.imageName == ''}" class="no-image">
                    No Image
                </span>
            </td>
        </tr>
    </table>

    <div class="total">
        Total Fine: ₹ <span th:text="${totalFine}"></span>
    </div>

    <!-- ✅ PAYMENT SUCCESS -->
    <div class="success" th:if="${paid}">
        ✔ Payment Successful
    </div>

    <!-- ❌ QR PAYMENT -->
    <div class="qr-section" th:if="${!paid}">
        <h3>Scan QR to Pay</h3>

        <img th:src="@{'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=9381184308@axl&pn=TrafficFine&am=' + ${totalFine} + '&cu=INR'}"/>

        <br>

        <a th:href="@{'/checkPayment/' + ${violations[0].vehicleNumber}}">
            <button class="btn btn-blue">Check Payment Status</button>
        </a>
    </div>

    <!-- ✅ DOWNLOAD RECEIPT -->
    <div style="text-align:center;" th:if="${paid}">
        <a th:href="@{'/downloadReceiptByVehicle/' + ${violations[0].vehicleNumber}}">
            <button class="btn">Download Receipt</button>
        </a>
    </div>

</div>

</body>
</html>
