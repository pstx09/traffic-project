# 🔥 PERSISTENT DATABASE (VERY IMPORTANT)
spring.datasource.url=jdbc:h2:file:./data/trafficdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 CONSOLE
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# SERVER PORT (RENDER FIX)
server.port=${PORT:8080}

# THYMELEAF (YOUR FRONTEND FOLDER)
spring.thymeleaf.prefix=classpath:/Frontend/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# 🔥 FILE UPLOAD SETTINGS (IMPORTANT FOR IMAGES)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB